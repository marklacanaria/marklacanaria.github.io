    <script>

};

      // Apply dark mode on page load

        const isDarkMode = localStorage.getItem("darkMode") === "true";
        if (isDarkMode) {
          document.body.classList.add("dark-mode");
          document.documentElement.classList.add("dark-mode");
          document.getElementById("darkModeToggle").checked = true;
        }
      };

      // Add event listener to the toggle button
document.getElementById("darkModeToggle").addEventListener("change", toggleDarkMode);

<style>
  .switch {
  position: relative;
  display: inline-block;
  width: 40px; /* Decreased width */
  height: 24px; /* Decreased height */
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  transition: 0.4s;
  border-radius: 24px; /* Adjusted to match the height */
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px; /* Decreased height */
  width: 18px; /* Decreased width */
  left: 3px; /* Adjusted position */
  bottom: 3px; /* Adjusted position */
  background-color: white;
  transition: 0.4s;
  border-radius: 50%;
}

input:checked + .slider:before {
  transform: translateX(16px); /* Adjusted translation */
}

.switch input:focus {
  outline: none; /* Removes the blue outline */
}

/* Carousel Styles */
/* Carousel Styles */
.carousel {
  position: relative;
  max-width: 100%; /* Make the carousel responsive */
  margin: 0 auto;
  overflow: hidden;
}

.carousel-inner {
  display: flex;
  transition: transform 0.5s ease-in-out;
}

.carousel-item {
  min-width: 100%;
  box-sizing: border-box;
  display: none;
}

.carousel-item.active {
  display: block;
}

.carousel-control {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background-color: rgba(0, 0, 0, 0.5);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  font-size: 18px;
}

.carousel-control.prev {
  left: 10px;
}

.carousel-control.next {
  right: 10px;
}

.carousel-control:hover {
  background-color: rgba(0, 0, 0, 0.8);
}

/* Responsive Adjustments for Mobile Devices */
@media (max-width: 768px) {
  .carousel {
    max-width: 90%; /* Reduce width on smaller screens */
  }

  .carousel-item img {
    width: 100%; /* Make images responsive */
    height: auto; /* Maintain aspect ratio */
  }

  .carousel-control {
    padding: 8px; /* Smaller buttons on mobile */
    font-size: 16px;
  }
}

@media (max-width: 480px) {
  .carousel {
    max-width: 100%; /* Full width on very small screens */
  }

  .carousel-control {
    padding: 6px; /* Even smaller buttons */
    font-size: 14px;
  }
}

<script>
let currentSlide = 0;

function showSlide(index) {
  const slides = document.querySelectorAll(".carousel-item");
  if (index >= slides.length) {
    currentSlide = 0;
  } else if (index < 0) {
    currentSlide = slides.length - 1;
  } else {
    currentSlide = index;
  }
  slides.forEach((slide, i) => {
    slide.classList.toggle("active", i === currentSlide);
  });
}

function moveSlide(direction) {
  showSlide(currentSlide + direction);
}

// Automatically move to the next slide every 5 seconds
//setInterval(() => {
  //moveSlide(1);
//}, 5000);

// Initialize the first slide
showSlide(currentSlide);

</script>
