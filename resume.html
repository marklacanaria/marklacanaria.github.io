<script>
  // Add these variables at the top
let isDragging = false;
let startX = 0;
let startY = 0;
let translateX = 0;
let translateY = 0;
let scale = 1;

// Update the image click handler
document.querySelectorAll('.resume-container img').forEach(img => {
  img.addEventListener('click', () => {
    modal.style.display = 'flex';
    modalImg.src = img.src;
    // Reset zoom and position when opening new image
    scale = 1;
    translateX = 0;
    translateY = 0;
    modalImg.style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
    zoomSlider.value = 1;
  });
});

// Add zoom slider functionality
const zoomSlider = document.getElementById('zoomSlider');
zoomSlider.addEventListener('input', (e) => {
  scale = parseFloat(e.target.value);
  modalImg.style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
});

// Add drag to pan functionality
modalImg.addEventListener('mousedown', (e) => {
  isDragging = true;
  startX = e.clientX - translateX;
  startY = e.clientY - translateY;
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  e.preventDefault();
  
  translateX = e.clientX - startX;
  translateY = e.clientY - startY;
  modalImg.style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
});

document.addEventListener('mouseup', () => {
  isDragging = false;
});

// Reset transform when closing
function resetImage() {
  scale = 1;
  translateX = 0;
  translateY = 0;
  modalImg.style.transform = `scale(${scale})`;
  zoomSlider.value = 1;
}

// Update close handlers to call resetImage
[closeBtn, modal].forEach(element => {
  element.addEventListener('click', () => {
    modal.style.display = 'none';
    resetImage();
  });
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modal.style.display === 'flex') {
    modal.style.display = 'none';
    resetImage();
  }
});
</script>

<!--image view script-->
<script>

  
  // Image modal handling
const modal = document.querySelector('.modal');
const modalImg = document.getElementById('modalImage');
const closeBtn = document.querySelector('.close-button');

// Open modal when clicking resume images
document.querySelectorAll('.resume-container img').forEach(img => {
  img.addEventListener('click', () => {
    modal.style.display = 'flex';
    modalImg.src = img.src;
  });
});

// Close modal interactions
closeBtn.addEventListener('click', () => {
  modal.style.display = 'none';
});

modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    modal.style.display = 'none';
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modal.style.display === 'flex') {
    modal.style.display = 'none';
  }
});
</script>
