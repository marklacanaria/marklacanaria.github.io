<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      // Immediate theme application
      (function() {
        const isDarkMode = localStorage.getItem("darkMode") === "true";
        if (isDarkMode) {
          document.documentElement.classList.add('dark-mode');
          document.body.classList.add('dark-mode');
        }
      })();
    </script>
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>.resume | markyDev</title>
    <meta name="description" content="Resume of Mark Lacanaria." />
    <meta name="keywords" content="Resume By Mark Lacanaria" />
    <link rel="shortcut icon" href="logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script src="https://kit.fontawesome.com/1a48924413.js" crossorigin="anonymous"></script>
    
  </head>
  <body>
    <header>
      <div id="head">Resume of Marky<span class="cursor">_</span></div>
    </header>
    <main id="content">
      <div class="container">
        <div id="bar">
          <div class="icon icon-red"></div>
          <div class="icon icon-yellow"></div>
          <div class="icon icon-green"></div>
        </div>
        <div id="screen">
          <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
          </label>
        
         
          <span class="toggle-text">Toggle Theme</span>
            <center class="toggle-text">scroll down</center>
          <div id="innercontent">
          <!--  <h3 class="heading">you can download a copy of this below [scroll a little bit]</h3>-->
            <div class="resume-container">
              <img src="for resume.png" alt="Resume Preview" width="100%">
                <div class="toggle-text">Or you can download the PDF file from this 
                <a class="heading" href="https://docs.google.com/document/d/1YauujNkUQnycrzwGSLOgqFDr4_oyXQT57Gwo25TZgz0/export?format=pdf">link</a>.
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer id="footer">
      <div class="wrapper">
        <div class="social-icons">
          <a href="https://github.com/marklacanaria" target="_blank" rel="noopener" aria-label="Github">
            <i class="fab fa-github fa-lg"></i>
          </a>
          <a href="https://web.facebook.com/mark.andradeyu.94" target="_blank" rel="noopener" aria-label="Facebook">
            <i class="fab fa-facebook fa-lg"></i>
          </a>
          <a href="https://twitter.com/yoitsmemarky" target="_blank" rel="noopener" aria-label="Twitter">
            <i class="fab fa-twitter fa-lg"></i>
          </a>
        </div>
        <div class="wrap">
          <a href="index.html">Home</a>
          <a href="projects.html">Projects</a>
          <a href="https://marklacanaria.github.io/home/" target="_blank">OldPortfolio</a>
        </div>
      </div>
    </footer>
    <script>
      document.getElementById("darkModeToggle").addEventListener("change", function() {
        document.body.classList.toggle("dark-mode");
        localStorage.setItem("darkMode", document.body.classList.contains("dark-mode"));
      });
      
      window.onload = function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.body.classList.add("dark-mode");
          document.getElementById("darkModeToggle").checked = true;
        }
      };
    </script>
  </body>
</html>

<style>
  .switch {
  position: relative;
  display: inline-block;
  width: 40px; /* Decreased width */
  height: 24px; /* Decreased height */
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  transition: 0.4s;
  border-radius: 24px; /* Adjusted to match the height */
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px; /* Decreased height */
  width: 18px; /* Decreased width */
  left: 3px; /* Adjusted position */
  bottom: 3px; /* Adjusted position */
  background-color: white;
  transition: 0.4s;
  border-radius: 50%;
}

input:checked + .slider:before {
  transform: translateX(16px); /* Adjusted translation */
}

.toggle-text {
  color: #ffffff; /* Default color */
  font-size: 0.9rem;
  cursor: pointer;
  font-display: block;
}


/* Dark mode text color */
.dark-mode .toggle-text {
  color: #fff;
}


</style>
